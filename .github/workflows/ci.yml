name: baseline-ci

on:
  pull_request:
  push:
    branches:
      - main
      - next
      - alpha
      - beta

permissions:
  contents: read

jobs:
  baseline-build-and-unit-gates:
    name: baseline-build-and-unit-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize root-level build submodules
        run: git submodule update --init references/Hexalith.AI.Tools references/Hexalith.Builds references/Hexalith.Commons references/Hexalith.EventStore references/Hexalith.FrontComposer references/Hexalith.Memories references/Hexalith.Tenants

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            nuget.config
            **/*.csproj

      - name: Run restore, build, format, lint, and unit-tests
        shell: pwsh
        timeout-minutes: 25
        run: ./tests/tools/run-baseline-ci-gates.ps1

  contract-and-parity-gates:
    name: contract-and-parity-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize root-level build submodules
        run: git submodule update --init references/Hexalith.AI.Tools references/Hexalith.Builds references/Hexalith.Commons references/Hexalith.EventStore references/Hexalith.FrontComposer references/Hexalith.Memories references/Hexalith.Tenants

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            nuget.config
            **/*.csproj

      - name: Restore
        run: dotnet restore Hexalith.Folders.slnx -m:1 -p:NuGetAudit=false

      - name: Build
        run: dotnet build Hexalith.Folders.slnx --no-restore -m:1

      - name: Run contract and parity gates
        shell: pwsh
        timeout-minutes: 30
        run: ./tests/tools/run-contract-parity-ci-gates.ps1

  security-and-redaction-gates:
    name: security-and-redaction-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize root-level build submodules
        run: git submodule update --init references/Hexalith.AI.Tools references/Hexalith.Builds references/Hexalith.Commons references/Hexalith.EventStore references/Hexalith.FrontComposer references/Hexalith.Memories references/Hexalith.Tenants

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            nuget.config
            **/*.csproj

      - name: Restore
        run: dotnet restore Hexalith.Folders.slnx -m:1 -p:NuGetAudit=false

      - name: Build
        run: dotnet build Hexalith.Folders.slnx --no-restore -m:1

      - name: Run security and redaction gates
        shell: pwsh
        timeout-minutes: 20
        run: ./tests/tools/run-security-redaction-ci-gates.ps1

  capacity-smoke-gates:
    name: capacity-smoke-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize root-level build submodules
        run: git submodule update --init references/Hexalith.AI.Tools references/Hexalith.Builds references/Hexalith.Commons references/Hexalith.EventStore references/Hexalith.FrontComposer references/Hexalith.Memories references/Hexalith.Tenants

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            nuget.config
            **/*.csproj

      - name: Restore
        run: dotnet restore Hexalith.Folders.slnx -m:1 -p:NuGetAudit=false

      - name: Build
        run: dotnet build Hexalith.Folders.slnx --no-restore -m:1

      - name: Run capacity smoke gates
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-capacity-smoke-ci-gates.ps1

  accessibility-gates:
    name: accessibility-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize root-level build submodules
        run: git submodule update --init references/Hexalith.AI.Tools references/Hexalith.Builds references/Hexalith.Commons references/Hexalith.EventStore references/Hexalith.FrontComposer references/Hexalith.Memories references/Hexalith.Tenants

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            nuget.config
            **/*.csproj

      - name: Provision Playwright Chromium browser
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/install-playwright.ps1

      - name: Run accessibility gate
        shell: pwsh
        timeout-minutes: 30
        run: ./tests/tools/run-accessibility-ci-gates.ps1 -SkipBrowserInstall

  e2e-gates:
    name: e2e-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize root-level build submodules
        run: git submodule update --init references/Hexalith.AI.Tools references/Hexalith.Builds references/Hexalith.Commons references/Hexalith.EventStore references/Hexalith.FrontComposer references/Hexalith.Memories references/Hexalith.Tenants

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            global.json
            nuget.config
            **/*.csproj

      - name: Provision Playwright Chromium browser
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/install-playwright.ps1

      - name: Run full UI end-to-end gate
        shell: pwsh
        timeout-minutes: 30
        run: ./tests/tools/run-e2e-ci-gates.ps1 -SkipBrowserInstall
