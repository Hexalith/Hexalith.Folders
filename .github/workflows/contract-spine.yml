name: contract-spine-gates

on:
  pull_request:
  push:
    branches:
      - main
      - next
      - alpha
      - beta

permissions:
  contents: read

jobs:
  contract-generated-artifact-gates:
    name: contract and generated artifact gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Hexalith.Folders.slnx

      - name: Build
        run: dotnet build Hexalith.Folders.slnx --no-restore

      - name: Run contract spine gates
        shell: pwsh
        run: ./tests/tools/run-contract-spine-gates.ps1 -NoRestore

      - name: Run safety invariant gates
        if: ${{ !cancelled() }}
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-safety-invariant-gates.ps1 -SkipRestoreBuild

      - name: Run governance completeness gates
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-governance-completeness-gates.ps1 -SkipRestoreBuild

      - name: Run Dapr policy conformance gates
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-dapr-policy-conformance-gates.ps1 -SkipRestoreBuild

      - name: Run production observability conformance gates
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-production-observability-gates.ps1 -SkipRestoreBuild

      - name: Run consumer docs conformance gates
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-consumer-docs-gates.ps1 -SkipRestoreBuild

      - name: Run operations and audit docs conformance gates
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-operations-audit-docs-gates.ps1 -SkipRestoreBuild

      - name: Run provider and error docs conformance gates
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-provider-error-docs-gates.ps1 -SkipRestoreBuild
