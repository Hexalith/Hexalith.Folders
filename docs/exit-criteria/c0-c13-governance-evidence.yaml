schema_version: '1.0.0'
gate: governance-completeness
source_authority:
  - _bmad-output/planning-artifacts/architecture.md
  - docs/exit-criteria/
  - tests/fixtures/
diagnostic_policy:
  safe_fields:
    - gate
    - criterion_id
    - artifact_path
    - owner
    - status
    - bounded_category
    - safe_hash
  forbidden_fields:
    - raw_payload
    - file_content
    - diff
    - provider_token
    - credential_material
    - tenant_data
    - local_absolute_path
approval_policy:
  # Governance freshness + exact approval-record policy for approval-backed criteria (those whose
  # `approved` status rests on a human sign-off rather than a machine-validated gate). Enforced
  # generically by GovernanceCompletenessGateTests over every criterion that carries an `approval`
  # block, so no approval-backed criterion can pass with a stale report or a generic "Legal-approved"
  # phrase in place of a named, dated signer.
  #
  # Mandatory global freshness window: an approval whose newest required-authority sign-off is older
  # than this many days fails closed and forces a governance re-review. This is an intentional
  # time-based redden, not a defect; refresh the sign-off (or widen the window by decision) to clear.
  max_age_days: 365
  # Approver values too generic to be an exact approval record. A required-authority record whose
  # approver (trimmed, case-insensitive) is one of these — or equal to its own authority name — fails
  # closed, so a bare "Legal" / "PM" / "signed" phrase cannot stand in for a named signer.
  generic_approver_tokens:
    - approved
    - approve
    - legal
    - legal-approved
    - legally approved
    - pm
    - pm-approved
    - pending
    - pending-review
    - tbd
    - todo
    - placeholder
    - signed
    - sign-off
    - signoff
    - none
    - 'n/a'
    - unknown
    - yes
# Governance-approval / NFR-traceability decoupling precedent (see architecture.md §"Architecture Exit
# Criteria" → "Governance-approval / NFR-traceability decoupling precedent" and docs/exit-criteria/
# nfr-traceability.md "Status semantics"). A criterion's `approved` status here and the status of the NFR
# rows that cite it in nfr-traceability.md are separately-owned tracks: approving a criterion does NOT
# auto-convert its cited NFR rows to `covered`, and a lingering `reference-pending` NFR row does NOT reopen
# this approval. C3 and C4 are approved below yet still own reference-pending rows (NFR57 cites C3; NFR26 and
# NFR28 cite C4), hard-pinned by NfrTraceabilityConformanceTests.ReferencePendingRowsAreOwnedAndSurfaceKnownGaps.
criteria:
  - criterion_id: C0
    title: Contract Spine source of truth
    owner: Architecture
    status: approved
    artifact_path: src/Hexalith.Folders.Contracts/openapi/hexalith.folders.v1.yaml
    verification_command: .\tests\tools\run-contract-spine-gates.ps1 -NoRestore
    result_summary: OpenAPI Contract Spine exists and is consumed by contract, client, and parity gates.
    open_policy_placeholders: []
  - criterion_id: C1
