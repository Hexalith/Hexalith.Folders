# Sanitized production control-plane conformance artifact.
# This fixture proves mTLS intent without storing certificates or other secret material.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: daprsystem
  namespace: dapr-system
spec:
  mtls:
    enabled: true
    workloadCertTTL: "24h"
    allowedClockSkew: "15m"
