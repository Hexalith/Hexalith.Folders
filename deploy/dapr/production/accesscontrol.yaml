apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: hexalith-folders-production-accesscontrol-memories
  namespace: hexalith-production
  annotations:
    hexalith.io/target-app-id: memories
    hexalith.io/trust-domain-template: DAPR_TRUST_DOMAIN
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "hexalith-production"
    policies:
      # Story 10.5: the Folders Server query facade reads the Memories search index via GET /api/search.
      # folders-workers publishes to memories-events over pub/sub (no invoke) and gets no invoke allow-rule here.
      - appId: folders
        defaultAction: deny
        trustDomain: "hexalith-production"
        namespace: "hexalith-production"
        operations:
          - name: /api/search
            httpVerb: ["GET"]
            action: allow
  secrets:
    scopes:
      - storeName: kubernetes
        defaultAccess: deny
        allowedSecrets: []
