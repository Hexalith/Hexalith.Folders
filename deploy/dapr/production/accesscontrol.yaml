# Sanitized production conformance artifact.
# Platform deployment tooling mirrors these deny-by-default semantics and may template namespace/trust-domain values.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: hexalith-folders-production-accesscontrol-folders
  namespace: hexalith-production
  annotations:
    hexalith.io/target-app-id: folders
    hexalith.io/trust-domain-template: DAPR_TRUST_DOMAIN
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "hexalith-production"
    policies:
      - appId: eventstore
        defaultAction: deny
        trustDomain: "hexalith-production"
        namespace: "hexalith-production"
        operations:
          - name: /process
            httpVerb: ["POST"]
            action: allow
          - name: /project
            httpVerb: ["POST"]
            action: allow
  secrets:
    scopes:
      - storeName: folders-provider-credentials
        defaultAccess: deny
        allowedSecrets:
          - github-app-installation-ref-synthetic
          - forgejo-user-delegated-ref-synthetic
      - storeName: kubernetes
        defaultAccess: deny
        allowedSecrets: []
---
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: hexalith-folders-production-accesscontrol-eventstore
  namespace: hexalith-production
  annotations:
    hexalith.io/target-app-id: eventstore
    hexalith.io/trust-domain-template: DAPR_TRUST_DOMAIN
spec:
