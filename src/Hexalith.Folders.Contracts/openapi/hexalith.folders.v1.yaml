  /api/v1/provider-readiness/validations:
    post:
      tags:
        - provider-readiness
      operationId: ValidateProviderReadiness
      summary: Validate provider readiness through sanitized evidence.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
