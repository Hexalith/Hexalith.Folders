x-hexalith-idempotency-key:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-idempotency-key
  foundationUse: Mutating operations added later must declare the key requirement; queries must not accept it.
x-hexalith-idempotency-equivalence:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-idempotency-equivalence
  foundationUse: Semantic field paths must be lexicographically ordered and tenant scoped.
x-hexalith-idempotency-ttl-tier:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-idempotency-ttl-tier
  foundationUse: Only mutation and commit tiers are valid; C3 commit duration remains approval-bound.
x-hexalith-correlation:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-correlation
  foundationUse: Correlation and task identity flow through REST, SDK, CLI, MCP, EventStore envelopes, audit, logs, and traces.
x-hexalith-authorization:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-authorization
  foundationUse: Operations declare tenant authority provenance, required authorization layer, and safe-denial behavior.
x-hexalith-canonical-error-categories:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-canonical-error-categories
  foundationUse: Operations declare bounded canonical error categories for REST, SDK, CLI, and MCP parity.
x-hexalith-read-consistency:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-read-consistency
  foundationUse: Non-mutating operations declare read consistency, freshness, and projection behavior without accepting idempotency keys.
x-hexalith-lifecycle-states:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-lifecycle-states
  foundationUse: C6 vocabulary is descriptive here; state transition implementation is deferred.
x-hexalith-parity-dimensions:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-parity-dimensions
  foundationUse: Reusable parity vocabulary only; no endpoint assertions, provider matrices, or parity rows are defined here.
x-hexalith-audit-metadata-keys:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-audit-metadata-keys
  foundationUse: Audit declarations are metadata-only and tenant scoped.
x-hexalith-sensitive-metadata-tier:
  vocabularyRef: ./extensions/hexalith-extension-vocabulary.yaml#/x-hexalith-sensitive-metadata-tier
  foundationUse: Paths, repository names, branch names, and commit messages default to tenant_sensitive metadata.
components:
  securitySchemes:
    oidcBearer:
      type: openIdConnect
      description: >
        JWT token validated through pluggable OIDC configuration. Issuer
        and audience values are pinned by deployment configuration and are not
        contract literals. Claims are transformed by EventStore before tenant
        authority is evaluated.
      openIdConnectUrl: https://oidc.invalid/.well-known/openid-configuration
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Required on mutating commands and invalid on non-mutating queries. Adapters MUST source the key from the caller and propagate it through SDK/CLI/MCP surfaces without re-encoding.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Optional caller-provided correlation identifier; adapters may generate one when absent.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    TaskId:
      name: X-Hexalith-Task-Id
      in: header
      required: false
      description: Caller-provided task identity for task-scoped operations.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    Freshness:
      name: X-Hexalith-Freshness
      in: header
      required: false
      description: Requested read-consistency or projection freshness hint for query families.
      schema:
        $ref: "#/components/schemas/ReadConsistencyClass"
    RetryAs:
      name: X-Hexalith-Retry-As
      in: header
      required: false
      description: Metadata-only retry intent for supported adapters; never overrides authorization.
      schema:
        type: string
        enum:
          - caller
          - operator
    PageCursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor for bounded query families.
      schema:
        type: string
        minLength: 1
        maxLength: 256
    PageLimit:
      name: limit
      in: query
      required: false
      description: "Requested result bound. C4 numeric defaults remain approval-bound until PM approval; the defensive ceiling of 1000 is a TODO(reference-pending C4 input limit) value derived from sibling C4 evidence and MUST be replaced once C4 is frozen. Runtime servers MUST clamp to the smaller of the requested value and the configured maximum and surface the effective limit alongside the requested value in pagination metadata."
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    MetadataFilter:
      name: filter
      in: query
      required: false
      description: "Future bounded metadata filter expression. Raw file contents and path lists are not valid filter payloads. Allowed filter-key vocabulary for ListAuditTrail and ListOperationTimeline is TODO(reference-pending C4); until frozen, runtime servers MUST reject any filter key not in their per-operation allow-list and SHOULD emit `validation_error` for unknown keys. The shape pattern below restricts characters only, not semantics."
      schema:
        type: string
        minLength: 1
        maxLength: 256
        pattern: '^[a-z][A-Za-z0-9_=.,*\- ]{0,255}$'
    FolderId:
      name: folderId
      in: path
      required: true
      description: Opaque tenant-scoped folder identifier. It is an addressable resource reference, not tenant authority.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    AclEntryId:
      name: aclEntryId
      in: path
      required: true
      description: Opaque ACL entry identifier.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    ProviderBindingRef:
      name: providerBindingRef
      in: path
      required: true
      description: Opaque provider binding reference. It does not prove provider account ownership or tenant authority.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    RepositoryBindingId:
      name: repositoryBindingId
      in: path
      required: true
      description: Opaque repository binding identifier. It does not reveal external repository existence to unauthorized callers.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      description: Opaque workspace identifier scoped by authorized tenant, folder, repository binding, branch/ref policy, and task. It is not a local filesystem path and does not establish tenant authority.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    OperationId:
      name: operationId
      in: path
      required: true
      description: Opaque operation identifier scoped by authorized tenant, folder, workspace, task, and operation family. It is not tenant authority.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    TimelineEntryId:
      name: timelineEntryId
      in: path
      required: true
      description: "Opaque identifier for a single operation-timeline entry (one row in the timeline projection). One operation can produce multiple timeline entries (state transitions over its lifecycle), so the entry id is the unique key for `GetOperationTimelineEntry`. Tenant authority is not established by this value."
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    AuditRecordId:
      name: auditRecordId
      in: path
      required: true
      description: Opaque audit record identifier. It selects candidate audit evidence only after tenant, folder, audit, and diagnostic audience authorization succeed.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    ReconciliationId:
      name: reconciliationId
      in: path
      required: true
      description: Opaque reconciliation identifier. It does not reveal provider outcome or protected resource existence before authorization succeeds.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
  headers:
    IdempotencyKey:
      description: Echoes the accepted idempotency key reference when response contracts require it.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    CorrelationId:
      description: Echoes the correlation identifier associated with the response.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    TaskId:
      description: Echoes the task identifier associated with task-scoped work.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    Freshness:
      description: Reports projection freshness semantics for a response.
      schema:
        $ref: "#/components/schemas/ReadConsistencyClass"
    RetryAs:
      description: Reports accepted retry intent metadata where a later operation declares support.
      schema:
        type: string
        enum:
          - stream
    RetryTransport:
      description: "Transport-substitution hint emitted with `413 Payload Too Large` on inline file mutations. Distinct from the request-side `X-Hexalith-Retry-As` header (which signals retry allocation `[caller, operator]`); this header signals an alternative wire transport `[stream]`. Keeping the names disjoint avoids round-trip echo conflicts."
      schema:
        type: string
        enum:
          - stream
  responses:
    AcceptedCommand:
      description: Command accepted for asynchronous processing.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        X-Hexalith-Task-Id:
          $ref: "#/components/headers/TaskId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AcceptedCommand"
    ProjectedStatus:
      description: Projection-backed status response with freshness evidence.
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
        X-Hexalith-Freshness:
          $ref: "#/components/headers/Freshness"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProjectedStatus"
    PagedResult:
      description: Bounded metadata-only paged result.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PagedResult"
    FreshnessMetadata:
      description: Projection freshness metadata for query and status responses.
      headers:
        X-Hexalith-Freshness:
          $ref: "#/components/headers/Freshness"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FreshnessMetadata"
    SafeAuthorizationDenial401:
      description: Authentication failure (no valid token). Externally indistinguishable across all caller cases.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/SafeAuthorizationDenial"
          examples:
            synthetic:
              $ref: "#/components/examples/SafeDenial401Unauthorized"
    SafeAuthorizationDenial403:
      description: Authorization denied for an authenticated caller. Externally indistinguishable across tenant/folder/binding/policy cases.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/SafeAuthorizationDenial"
          examples:
            synthetic:
              $ref: "#/components/examples/SafeDenial403Forbidden"
    SafeAuthorizationDenial404:
      description: Safe denial for missing-or-unauthorized resources. Externally indistinguishable across absent, cross-tenant, missing-binding, and missing-policy cases — does not reveal protected resource existence.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/SafeAuthorizationDenial"
          examples:
            synthetic:
              $ref: "#/components/examples/SafeDenial404NotFound"
    ValidationFailure:
      description: Validation failure represented as RFC 9457 Problem Details plus Hexalith canonical fields.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ValidationFailure"
    IdempotencyConflict:
      description: Same idempotency key with non-equivalent tenant-scoped payload semantics.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/IdempotencyConflict"
    ReconciliationRequired:
      description: Provider outcome requires explicit reconciliation before the task can be treated as complete.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ReconciliationRequired"
    ReadModelUnavailable:
      description: Read model is temporarily unavailable without leaking protected resource existence.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            synthetic:
              $ref: "#/components/examples/ReadModelUnavailable"
    ProviderUnavailable:
      description: Provider dependency is unavailable or readiness cannot be safely established.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ProviderRateLimited:
      description: Provider readiness or repository operation is rate limited.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    RepositoryConflict:
      description: Repository creation or binding conflict represented without external resource hints. Returns canonical category `repository_conflict` (distinct from `idempotency_conflict`).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            synthetic:
              $ref: "#/components/examples/RepositoryConflictExample"
    DuplicateBinding:
      description: Duplicate repository binding outcome for an authorized caller. Returns canonical category `duplicate_binding` (distinct from `idempotency_conflict`).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            synthetic:
              $ref: "#/components/examples/DuplicateBindingExample"
    UnsupportedProviderCapability:
      description: Requested provider capability is not supported by the bound provider profile.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    LockConflict:
      description: Deterministic single-active-writer lock conflict without revealing hidden lock holder details. Authorization-first contract — this response is only reachable after authentication and authorization succeed; unauthorized callers receive the safe-denial envelope instead.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            synthetic:
              $ref: "#/components/examples/WorkspaceLockConflictProblem"
