          - post-sdk
  /api/v1/provider-readiness/validations:
    post:
      tags:
        - provider-readiness
      operationId: ValidateProviderReadiness
      summary: Validate provider readiness through sanitized evidence.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateProviderReadinessRequest"
      responses:
        "200":
          description: Provider readiness validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderReadiness"
              examples:
                consumer:
                  $ref: "#/components/examples/ProviderReadinessConsumer"
                authorizedOperator:
                  $ref: "#/components/examples/ProviderReadinessOperatorDiagnostic"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "429":
          $ref: "#/components/responses/ProviderRateLimited"
        "503":
          $ref: "#/components/responses/ProviderUnavailable"
      x-hexalith-read-consistency:
        class: snapshot_per_task
        freshnessBehavior: readiness-evidence-generated-for-request
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: provider-readiness-diagnostic-correlation
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-provider-readiness-read
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - provider_readiness_failed
        - credential_reference_invalid
        - provider_permission_insufficient
        - provider_unavailable
        - provider_rate_limited
        - unsupported_provider_capability
        - read_model_unavailable
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: provider_binding_ref
          sensitivity: tenant_sensitive
          description: Opaque provider binding reference.
        - name: readiness_status
          sensitivity: tenant_sensitive
          description: Sanitized readiness outcome.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: result
          sensitivity: public_metadata
          description: Sanitized provider readiness result.
      x-hexalith-parity-dimensions:
        transportParity:
          - rest
          - sdk
        behavioralParity:
          - provider_capability
          - provider_error_mapping
          - diagnostic_redaction
        adapterStages:
          - pre-sdk
          - post-sdk
  /api/v1/provider-readiness/support-evidence:
    get:
      tags:
        - provider-readiness
      operationId: GetProviderSupportEvidence
      summary: Inspect provider-neutral support and capability evidence.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Provider-neutral capability evidence.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSupportEvidenceList"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
