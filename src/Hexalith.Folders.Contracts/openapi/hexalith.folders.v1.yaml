          description: Lock identity, lease status, acquired/effective/expiry timestamps, and authorized-caller holder reference when the attempted transition affects the workspace lock (for example WorkspaceLocked, WorkspaceLockReleased, LockLeaseExpired). Omitted for transitions that do not affect a lock.
        auditMetadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                format: date-time
              - type: string
              - type: boolean
          description: Metadata-only audit reference; file contents, diffs, provider payloads, local paths, and unauthorized resource hints are forbidden. Timestamp-valued entries use RFC 3339 date-time strings.
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    PathMetadata:
      type: object
      additionalProperties: false
      description: >
        Workspace-root-relative path metadata. Paths use forward slashes, have no
        leading slash, are NFC-normalized by contract, and are never local or
        absolute filesystem paths. Traversal, symlink escape, reserved names, and
        case-collision outcomes are path-policy decisions evaluated before file or
        query execution.
      required:
        - normalizedPath
        - displayName
        - pathPolicyClass
        - unicodeNormalization
      properties:
        normalizedPath:
          type: string
          minLength: 1
          maxLength: 512
          pattern: "^(?!/)(?!.*(?:^|/)\\.\\.(?:$|/))(?!.*//)(?!.*(?:^|/)(?:CON|NUL|PRN|AUX|COM[1-9]|LPT[1-9])(?:\\.[^/]*)?(?:$|/))[A-Za-z0-9._/-]+$"
          description: "Workspace-root-relative path. The pattern rejects: leading slash, parent-directory segments `..` (segment-only, allowing legitimate filenames like `a..b`), empty segments `//`, and reserved Windows base names (CON, NUL, PRN, AUX, COM1-9, LPT1-9 with optional extension). Character class is transitional ASCII-only. TODO(reference-pending): Unicode allow-list policy and final NFC enforcement live in Story 1.5 parser-policy classification."
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        displayName:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[^\\x00-\\x1F\\x7F/\\\\]+$"
          description: "Human-readable file name. Rejects control characters (0x00-0x1F, 0x7F), forward slashes, and backslashes to prevent log injection and path-separator confusion."
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        pathPolicyClass:
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z][a-z0-9_]{0,79}$"
          description: "Server-determined path policy classification. TODO(reference-pending): closed enum of approved class values pending path-policy-class definition story. Until that story lands, the pattern is the only contract-level constraint and the canonical class list is documented in docs/contract/file-context-contract-groups.md."
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        unicodeNormalization:
          type: string
          enum:
            - NFC
    FileMutationRequest:
      type: object
      additionalProperties: false
      description: >
        Contract-only file mutation request. Two `oneOf` discriminators enforce the
        valid combinations: (a) `transportOperation` selects the transport shape
        (`PutFileInline` for content at or below 262144 bytes, `PutFileStream` for
        larger streamed content, `metadataOnlyRemoval` for delete); (b)
        `fileOperationKind` enforces that `remove` carries no content, content hash
        reference, or byte length. Add/change operations require a content hash
        reference and the matching transport branch.
      required:
        - requestSchemaVersion
        - fileOperationKind
        - transportOperation
        - operationId
        - pathMetadata
      properties:
        requestSchemaVersion:
          type: string
          const: v1
        fileOperationKind:
          type: string
          enum:
            - add
            - change
            - remove
        transportOperation:
          type: string
          enum:
            - PutFileInline
            - PutFileStream
            - metadataOnlyRemoval
        operationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        pathMetadata:
          $ref: "#/components/schemas/PathMetadata"
        contentHashReference:
          $ref: "#/components/schemas/ContentHashReference"
        byteLength:
          type: integer
          minimum: 0
          description: "Logical content length in bytes. Inline branch caps this at 262144; stream branch requires at least 262145. TODO(reference-pending): docs/exit-criteria/c4-input-limits.md PM approval state is proposed."
        inlineContent:
          $ref: "#/components/schemas/PutFileInline"
        streamDescriptor:
          $ref: "#/components/schemas/PutFileStream"
      oneOf:
        - title: InlineTransportBranch
          description: Add or change file via PutFileInline; content fits within the 262144-byte D-9 boundary.
          required:
            - inlineContent
            - byteLength
            - contentHashReference
          properties:
            transportOperation:
              const: PutFileInline
            fileOperationKind:
              enum:
                - add
                - change
            byteLength:
              maximum: 262144
          not:
            anyOf:
              - required:
                  - streamDescriptor
        - title: StreamTransportBranch
          description: Add or change file via PutFileStream; content exceeds the 262144-byte D-9 boundary.
          required:
            - streamDescriptor
            - byteLength
            - contentHashReference
          properties:
            transportOperation:
              const: PutFileStream
            fileOperationKind:
              enum:
                - add
                - change
            byteLength:
              minimum: 262145
          not:
            anyOf:
              - required:
                  - inlineContent
        - title: MetadataOnlyRemovalBranch
          description: Remove a file with metadata-only semantics. No content, content hash, byte length, inline content, or stream descriptor allowed.
          required:
            - transportOperation
            - fileOperationKind
          properties:
            transportOperation:
              const: metadataOnlyRemoval
            fileOperationKind:
              const: remove
          not:
            anyOf:
              - required:
                  - inlineContent
              - required:
                  - streamDescriptor
              - required:
                  - contentHashReference
              - required:
                  - byteLength
    PutFileInline:
      type: object
      additionalProperties: false
      required:
        - mediaType
        - contentBytes
      properties:
        mediaType:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9][A-Za-z0-9!#$&^_.+-]{0,126}/[A-Za-z0-9][A-Za-z0-9!#$&^_.+-]{0,126}$"
          description: "RFC 6838 token grammar (type/subtype). Parameters such as `;charset=utf-8` are not accepted here — callers send them via the transport `Content-Type` header."
        contentBytes:
          type: string
          contentEncoding: base64
          maxLength: 349528
          description: "Authorized request body only; base64-encoded bytes up to 262144 raw bytes (349528 base64 characters). Never emitted in events, logs, audit, diagnostics, examples outside request bodies, or context-query metadata. TODO(reference-pending): docs/exit-criteria/c4-input-limits.md PM approval state is proposed."
        contentMediaType:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9][A-Za-z0-9!#$&^_.+-]{0,126}/[A-Za-z0-9][A-Za-z0-9!#$&^_.+-]{0,126}$"
          description: Optional original media type when the request body media type differs (e.g., transport wrapper vs. authored content).
    PutFileStream:
      type: object
      additionalProperties: false
      required:
        - mediaType
        - declaredLength
        - uploadMode
      properties:
        mediaType:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9][A-Za-z0-9!#$&^_.+-]{0,126}/[A-Za-z0-9][A-Za-z0-9!#$&^_.+-]{0,126}$"
          description: "RFC 6838 token grammar (type/subtype). Parameters such as `;charset=utf-8` are not accepted here."
        declaredLength:
          type: integer
          minimum: 262145
        uploadMode:
          type: string
          enum:
            - request_body_stream
    FileMutationAccepted:
      allOf:
        - $ref: "#/components/schemas/AcceptedCommand"
      description: Accepted command metadata for file mutation operations. No file contents, diffs, provider payloads, local paths, or generated context payloads are included.
    FileMetadataRequest:
      type: object
      additionalProperties: false
      description: "Path-list metadata lookup. Aggregate request body should not exceed 65536 bytes after JSON encoding; downstream gateways MAY reject larger bodies with 413 before invoking authorization. TODO(reference-pending): aggregate-body cap pending docs/exit-criteria/c4-input-limits.md PM approval."
