        - archived
        - freshness
      properties:
        folderId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        lifecycleState:
          $ref: "#/components/schemas/LifecycleState"
        archived:
          type: boolean
        repositoryBindingId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        providerBindingRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    FolderAclEntry:
      type: object
      additionalProperties: false
      required:
        - aclEntryId
        - subjectRef
        - permissionLevel
        - effect
      properties:
        aclEntryId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        subjectRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        permissionLevel:
          $ref: "#/components/schemas/FolderPermissionLevel"
        effect:
          type: string
          enum:
            - grant
            - revoke
    FolderAclEntryList:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - freshness
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FolderAclEntry"
        page:
          $ref: "#/components/schemas/PaginationMetadata"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    UpdateFolderAclEntryRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - subjectRef
        - permissionLevel
        - effect
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        subjectRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        permissionLevel:
          $ref: "#/components/schemas/FolderPermissionLevel"
        effect:
          type: string
          enum:
            - grant
            - revoke
    EffectivePermissions:
      type: object
      additionalProperties: false
      required:
        - folderId
