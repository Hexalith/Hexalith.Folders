          $ref: "#/components/schemas/OpaqueIdentifier"
        requestedCapability:
          $ref: "#/components/schemas/ProviderCapabilityName"
    ProviderCapabilityName:
      type: string
      enum:
        - repository_creation
        - existing_repository_binding
        - branch_ref_policy
        - file_operations
        - commit_status
        - provider_errors
        - failure_behavior
    ProviderCapabilityState:
      type: string
      enum:
        - supported
        - unsupported
        - temporarily_unavailable
      description: Capability availability state. Recovery/retry policy is expressed separately by ProviderFailureBehavior.
    ProviderFailureBehavior:
      type: string
      enum:
        - documented
        - retry_after_backoff
      description: How a provider failure should be handled by callers; orthogonal to ProviderCapabilityState.
    FolderPermissionLevel:
      type: string
      enum:
        - read
        - write
        - administer
    ProviderCapabilityEvidence:
      type: object
      additionalProperties: false
      required:
        - repositoryCreation
        - existingRepositoryBinding
        - branchRefPolicy
        - fileOperations
        - commitStatus
        - providerErrors
        - failureBehavior
      properties:
        repositoryCreation:
          $ref: "#/components/schemas/ProviderCapabilityState"
        existingRepositoryBinding:
          $ref: "#/components/schemas/ProviderCapabilityState"
        branchRefPolicy:
          $ref: "#/components/schemas/ProviderCapabilityState"
        fileOperations:
          $ref: "#/components/schemas/ProviderCapabilityState"
        commitStatus:
          $ref: "#/components/schemas/ProviderCapabilityState"
        providerErrors:
          $ref: "#/components/schemas/ProviderCapabilityState"
        failureBehavior:
          $ref: "#/components/schemas/ProviderFailureBehavior"
    ProviderReadinessStatus:
      type: string
      enum:
        - ready
        - degraded
        - failed
    ProviderReadinessConsumer:
      type: object
      additionalProperties: false
      description: Consumer-audience readiness response. Exposes safe status and retry guidance only; never per-capability evidence, credential state, installation identity, or unauthorized resource existence.
      required:
        - audience
        - status
        - freshness
      properties:
        audience:
          type: string
          enum:
            - consumer
        status:
          $ref: "#/components/schemas/ProviderReadinessStatus"
        retryHint:
          type: string
          enum:
            - no_retry_required
            - retry_after_backoff
            - contact_operator
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    ProviderReadinessOperator:
      type: object
      additionalProperties: false
      description: Authorized-operator readiness response with sanitized capability evidence. Never includes credential state, raw provider payloads, provider installation identity, or unauthorized resource hints.
      required:
        - audience
        - providerBindingRef
        - status
        - capabilityProfileRef
        - evidence
        - freshness
      properties:
        audience:
          type: string
          enum:
            - authorized_operator
        providerBindingRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        status:
          $ref: "#/components/schemas/ProviderReadinessStatus"
        capabilityProfileRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        evidence:
          $ref: "#/components/schemas/ProviderCapabilityEvidence"
        sanitizedErrorCategory:
          $ref: "#/components/schemas/CanonicalErrorCategory"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    ProviderReadiness:
      oneOf:
        - $ref: "#/components/schemas/ProviderReadinessConsumer"
        - $ref: "#/components/schemas/ProviderReadinessOperator"
      discriminator:
        propertyName: audience
        mapping:
          consumer: "#/components/schemas/ProviderReadinessConsumer"
          authorized_operator: "#/components/schemas/ProviderReadinessOperator"
    ProviderSupportEvidenceList:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - freshness
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProviderSupportEvidence"
        page:
          $ref: "#/components/schemas/PaginationMetadata"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    ProviderSupportEvidence:
      type: object
      additionalProperties: false
      required:
        - capabilityProfileRef
        - capability
        - supportState
      properties:
        capabilityProfileRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        capability:
          $ref: "#/components/schemas/ProviderCapabilityName"
        supportState:
          $ref: "#/components/schemas/ProviderCapabilityState"
    BranchRefPolicyRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - repositoryBindingId
        - policyRef
        - defaultRef
        - allowedRefPatterns
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        repositoryBindingId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        policyRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        defaultRef:
          type: string
          minLength: 14
          maxLength: 91
          pattern: "^branch_ref_[a-z0-9_]{3,80}$"
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        allowedRefPatterns:
          type: array
          minItems: 1
          maxItems: 16
          items:
            type: string
            minLength: 14
            maxLength: 91
            pattern: "^branch_ref_[a-z0-9_]{3,80}$"
            x-hexalith-sensitive-metadata-tier: tenant_sensitive
        protectedRefPatterns:
          type: array
          maxItems: 16
          items:
            type: string
            minLength: 14
            maxLength: 91
            pattern: "^branch_ref_[a-z0-9_]{3,80}$"
            x-hexalith-sensitive-metadata-tier: tenant_sensitive
    BranchRefPolicy:
      type: object
      additionalProperties: false
      description: Branch/ref policy response. Properties intentionally duplicate BranchRefPolicyRequest rather than allOf-extending it, because BranchRefPolicyRequest sets additionalProperties=false and adding `freshness` via allOf would violate strict JSON Schema validation.
      required:
        - requestSchemaVersion
        - repositoryBindingId
        - policyRef
        - defaultRef
        - allowedRefPatterns
        - freshness
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        repositoryBindingId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        policyRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        defaultRef:
          type: string
          minLength: 14
          maxLength: 91
          pattern: "^branch_ref_[a-z0-9_]{3,80}$"
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        allowedRefPatterns:
          type: array
          minItems: 1
          maxItems: 16
          items:
            type: string
            minLength: 14
            maxLength: 91
            pattern: "^branch_ref_[a-z0-9_]{3,80}$"
            x-hexalith-sensitive-metadata-tier: tenant_sensitive
        protectedRefPatterns:
          type: array
          maxItems: 16
          items:
            type: string
            minLength: 14
            maxLength: 91
            pattern: "^branch_ref_[a-z0-9_]{3,80}$"
            x-hexalith-sensitive-metadata-tier: tenant_sensitive
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    CreateRepositoryBackedFolderRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - providerBindingRef
        - repositoryProfileRef
        - folderMetadata
        - branchRefPolicy
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        providerBindingRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        repositoryProfileRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        folderMetadata:
          $ref: "#/components/schemas/FolderMetadata"
        branchRefPolicy:
          $ref: "#/components/schemas/BranchRefPolicyRequest"
    BindRepositoryRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - providerBindingRef
        - externalRepositoryRef
        - branchRefPolicy
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        providerBindingRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        externalRepositoryRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        branchRefPolicy:
          $ref: "#/components/schemas/BranchRefPolicyRequest"
    RepositoryBinding:
      type: object
      additionalProperties: false
      required:
        - repositoryBindingId
        - folderId
        - providerBindingRef
        - bindingState
        - sensitiveMetadataTier
        - freshness
      properties:
        repositoryBindingId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        folderId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        providerBindingRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        bindingState:
          type: string
          enum:
            - requested
            - bound
            - failed
            - unknown_provider_outcome
            - reconciliation_required
        sensitiveMetadataTier:
          $ref: "#/components/schemas/SensitiveMetadataTier"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    PrepareWorkspaceRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - repositoryBindingId
        - branchRefPolicyRef
        - workspacePolicyRef
      properties:
        requestSchemaVersion:
          type: string
          const: v1
        repositoryBindingId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        branchRefPolicyRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        workspacePolicyRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
    LockWorkspaceRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - lockIntent
        - requestedLeaseSeconds
      properties:
        requestSchemaVersion:
          type: string
          const: v1
        lockIntent:
          type: string
          enum:
            - exclusive_write
        requestedLeaseSeconds:
          type: integer
          minimum: 1
          maximum: 86400
          description: Requested lease metadata only. Default duration, renewal, and clock-skew policy remain deferred to approved source documents.
    ReleaseWorkspaceLockRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - lockId
        - lockOwnershipProof
        - releaseReasonCode
      properties:
        requestSchemaVersion:
          type: string
          const: v1
        lockId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        lockOwnershipProof:
          allOf:
            - $ref: "#/components/schemas/OpaqueIdentifier"
          description: Non-secret opaque lock proof scoped to an authorized tenant, folder, workspace, task, and lock. This value proves lock ownership only inside that scope and is not authentication, provider access, session material, refresh material, or an authorization override.
        releaseReasonCode:
          type: string
          enum:
            - caller_completed
            - caller_abandoned
            - operator_requested
            - authorization_revoked
            - task_cancelled
            - lock_revoked
    WorkspaceLockStatus:
      type: object
      additionalProperties: false
      required:
        - workspaceId
        - lockState
        - retryEligibility
        - freshness
      properties:
        workspaceId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        lockState:
          $ref: "#/components/schemas/LockState"
        lease:
          allOf:
            - $ref: "#/components/schemas/LockLeaseMetadata"
          description: Lease metadata is present only when a lock has ever been acquired for this workspace. Unlocked responses omit `lease`.
        retryEligibility:
          $ref: "#/components/schemas/WorkspaceRetryEligibility"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    LockState:
      type: string
      enum:
        - unlocked
        - locked
        - expired
        - stale
        - revoked
      description: Workspace lock state catalog. Narrower than `LifecycleState` because lock state is a property of the lock, not of the full workspace lifecycle.
    LockLeaseMetadata:
      type: object
      additionalProperties: false
      required:
        - lockId
        - leaseStatus
        - acquiredAt
        - effectiveAt
        - expiresAt
      properties:
        lockId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        leaseStatus:
          $ref: "#/components/schemas/LockLeaseStatus"
        acquiredAt:
          $ref: "#/components/schemas/UtcDateTime"
        effectiveAt:
          $ref: "#/components/schemas/UtcDateTime"
        expiresAt:
          $ref: "#/components/schemas/UtcDateTime"
        holderRef:
          allOf:
            - $ref: "#/components/schemas/OpaqueIdentifier"
          description: Metadata-only holder reference visible only to callers authorized for the lock scope.
    LockLeaseStatus:
      type: string
      enum:
        - active
        - stale
        - expired
        - released
        - revoked
    WorkspaceRetryEligibility:
      type: object
      additionalProperties: false
      required:
        - retryable
        - reasonCode
        - correlationId
        - currentState
        - freshness
      properties:
        retryable:
          type: boolean
        retryAfterSeconds:
          type: integer
          minimum: 0
          description: Optional metadata hint; exact retry policy is deferred to approved source documents.
        reasonCode:
          type: string
          enum:
            - retry_not_required
            - provider_unavailable_retry
            - lock_conflict_retry
            - lock_active
            - reconciliation_required
            - authorization_revoked
            - invalid_transition
        correlationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        taskId:
          allOf:
            - $ref: "#/components/schemas/OpaqueIdentifier"
          description: Opaque task reference when the eligibility evidence is task-scoped. Omitted for workspace-scoped lock inspection where no task is in scope.
        currentState:
          $ref: "#/components/schemas/LifecycleState"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    WorkspaceTransitionAttempt:
      type: object
      additionalProperties: false
      required:
        - fromState
        - eventName
        - toState
      properties:
        fromState:
          $ref: "#/components/schemas/LifecycleState"
        eventName:
          type: string
          enum:
            - RepositoryBindingRequested
            - RepositoryBound
            - RepositoryBindingFailed
            - ProviderOutcomeUnknown
            - WorkspacePrepared
            - WorkspacePreparationFailed
            - WorkspaceLocked
            - AuthRevocationDetected
            - TenantRevoked
            - RepositoryDeletedAtProvider
            - ReconciliationRequested
            - FileMutated
            - WorkspaceLockReleased
            - LockLeaseExpired
            - CommitSucceeded
            - CommitFailed
            - OperatorDiscardRequested
            - OperatorRetrySucceeded
            - ProviderReadinessValidated
            - ReconciliationCompletedClean
            - ReconciliationCompletedDirty
            - ReconciliationEscalated
            - OperatorMarkedFailed
        toState:
          $ref: "#/components/schemas/LifecycleState"
    WorkspaceTransitionResult:
      type: string
      enum:
        - accepted
        - rejected
        - state_transition_invalid
        - authorization_revoked
        - provider_outcome_unknown
        - reconciliation_required
    WorkspaceTransitionEvidence:
      type: object
      additionalProperties: false
      required:
        - workspaceId
        - currentState
        - attemptedTransition
        - result
        - reasonCode
        - evidenceAt
        - correlationId
        - auditMetadata
        - freshness
      properties:
        workspaceId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        currentState:
          $ref: "#/components/schemas/LifecycleState"
        attemptedTransition:
          $ref: "#/components/schemas/WorkspaceTransitionAttempt"
        result:
          $ref: "#/components/schemas/WorkspaceTransitionResult"
        reasonCode:
          type: string
          enum:
            - transition_allowed
            - state_transition_invalid
            - authorization_revoked
            - provider_outcome_unknown
            - reconciliation_required
        evidenceAt:
          $ref: "#/components/schemas/UtcDateTime"
        correlationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        taskId:
          allOf:
            - $ref: "#/components/schemas/OpaqueIdentifier"
          description: Opaque task reference when the transition was task-scoped. Omitted for non-task transitions.
        lockEvidence:
          allOf:
            - $ref: "#/components/schemas/LockLeaseMetadata"
          description: Lock identity, lease status, acquired/effective/expiry timestamps, and authorized-caller holder reference when the attempted transition affects the workspace lock (for example WorkspaceLocked, WorkspaceLockReleased, LockLeaseExpired). Omitted for transitions that do not affect a lock.
        auditMetadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
                format: date-time
              - type: string
              - type: boolean
          description: Metadata-only audit reference; file contents, diffs, provider payloads, local paths, and unauthorized resource hints are forbidden. Timestamp-valued entries use RFC 3339 date-time strings.
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    CanonicalErrorCategory:
      type: string
      enum:
        - success
        - authentication_failure
        - client_configuration_error
        - credential_missing
        - credential_reference_invalid
        - tenant_access_denied
        - cross_tenant_access_denied
        - folder_acl_denied
        - audit_access_denied
        - validation_error
        - idempotency_conflict
        - provider_readiness_failed
        - provider_permission_insufficient
        - provider_unavailable
        - provider_rate_limited
        - repository_binding_unavailable
        - branch_ref_policy_invalid
        - workspace_preparation_failed
        - workspace_locked
        - lock_conflict
        - lock_expired
        - lock_not_owned
        - stale_workspace
        - authorization_revocation_detected
        - repository_conflict
        - duplicate_binding
        - unsupported_provider_capability
        - provider_failure_known
        - unknown_provider_outcome
        - reconciliation_required
        - not_found
        - state_transition_invalid
        - input_limit_exceeded
        - response_limit_exceeded
        - query_timeout
        - read_model_unavailable
