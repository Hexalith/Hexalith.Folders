        - nonSecretCredentialReference
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        providerFamilyRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        capabilityProfileRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        nonSecretCredentialReference:
          $ref: "#/components/schemas/OpaqueIdentifier"
    ProviderBinding:
      type: object
      additionalProperties: false
      required:
        - providerBindingRef
        - providerFamilyRef
        - capabilityProfileRef
        - redaction
        - freshness
      properties:
        providerBindingRef:
          $ref: "#/components/schemas/OpaqueIdentifier"
        providerFamilyRef:
