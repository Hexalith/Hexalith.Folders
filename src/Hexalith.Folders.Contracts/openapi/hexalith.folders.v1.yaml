  schemas:
    PrefixedOpaqueIdentifier:
      type: string
      minLength: 16
      maxLength: 128
      pattern: "^[a-z][a-z0-9]*_[A-Za-z0-9_-]{8,120}$"
      description: Shared namespace-prefixed opaque identifier shape for sanitized references such as actorref_, digest_, changeref_, and provref_. Prefixes classify evidence domains; values are non-secret metadata and never tenant authority.
    OpaqueIdentifier:
      type: string
      minLength: 16
      maxLength: 128
      pattern: "^[A-Za-z0-9][A-Za-z0-9_-]{15,127}$"
      description: Synthetic opaque identifier (ULID-shaped). It is not a path, credential, token, or tenant authority. The pattern rejects dots and colons to keep keys disjoint from cache-key tenant-prefix notation and JWT-shaped values.
      examples:
        - opaque_01HZY7Z6N7J4Q2X8Y9V0A1B2C3
    ContentHashReference:
      type: string
      minLength: 40
      maxLength: 104
      pattern: "^hashref_[A-Za-z0-9]{32,96}$"
      description: Non-secret opaque content hash reference. The `hashref_` prefix distinguishes content hash references from generic opaque identifiers (`opaque_*`) to prevent cross-domain key reuse, copy-paste collisions with operation IDs, and audit-pipeline misclassification. The reference is never a secret, token, credential, file content, or absolute path.
      examples:
        - hashref_01HZY7Z6N7J4Q2X8Y9V0ADD002
    UtcDateTime:
      type: string
      format: date-time
      description: ISO-8601 UTC timestamp.
      examples:
        - "2026-05-12T12:34:56Z"
    ProblemDetails:
      type: object
      additionalProperties: true
      required:
        - type
        - title
        - status
        - category
        - code
        - message
        - correlationId
        - retryable
        - clientAction
        - details
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        category:
          $ref: "#/components/schemas/CanonicalErrorCategory"
        code:
          type: string
          pattern: "^[a-z0-9][a-z0-9_:-]{0,127}$"
        message:
          type: string
        correlationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        retryable:
          type: boolean
        clientAction:
          type: string
          enum:
            - retry
            - revise_request
            - check_credentials
            - wait_for_reconciliation
            - contact_operator
            - no_action
        details:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
          description: Metadata-only details. File contents, diffs, tokens, secrets, and unauthorized existence hints are forbidden.
    SafeAuthorizationDenial:
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
      description: Denial shape for tenant, folder, ACL, path-policy, and audit authorization failures.
    ValidationFailure:
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
      description: Input validation failure without echoing sensitive payload values.
    IdempotencyConflict:
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
      description: Idempotency conflict for same key and non-equivalent semantic request.
    ReconciliationRequired:
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
      description: Unknown or conflicted provider outcome that needs reconciliation.
    AcceptedCommand:
      type: object
      additionalProperties: false
      required:
        - acceptedAt
        - correlationId
        - taskId
        - status
      properties:
        acceptedAt:
          $ref: "#/components/schemas/UtcDateTime"
        correlationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        taskId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        status:
          type: string
          enum:
            - accepted
        idempotentReplay:
          type: boolean
          default: false
    ProjectedStatus:
      type: object
      additionalProperties: false
      required:
        - correlationId
        - taskId
        - state
        - freshness
      properties:
        correlationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        taskId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        state:
          $ref: "#/components/schemas/LifecycleState"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    PagedResult:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - freshness
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PagedItem"
          description: Bounded metadata-only item base. Downstream operation groups must allOf-extend PagedItem with concrete property schemas.
        page:
          $ref: "#/components/schemas/PaginationMetadata"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    PagedItem:
      type: object
      additionalProperties: false
      description: Empty metadata-only base. Downstream operation groups extend via allOf, declaring their concrete metadata properties.
    PaginationMetadata:
      type: object
      additionalProperties: false
      required:
        - limit
        - isTruncated
      properties:
        cursor:
          type: string
          maxLength: 256
          description: Opaque, non-secret pagination cursor for later bounded query families. The cursor is service-issued and MUST NOT carry tenant authority, ACL decisions, provider tokens, raw query text, or unredacted path lists. Length matches the `PageCursor` request parameter so callers can echo it back without re-encoding.
        limit:
          type: integer
          minimum: 1
          description: C4-backed bound; final normative value remains approval-bound until PM approval.
        isTruncated:
          type: boolean
        truncatedReason:
          type: string
          enum:
            - result_count_limit
            - response_budget_limit
            - query_timeout
    FreshnessMetadata:
      type: object
      additionalProperties: false
      required:
        - readConsistency
        - observedAt
      properties:
        readConsistency:
          $ref: "#/components/schemas/ReadConsistencyClass"
        observedAt:
          $ref: "#/components/schemas/UtcDateTime"
        projectionWatermark:
          $ref: "#/components/schemas/OpaqueIdentifier"
        stale:
          type: boolean
          default: false
    LifecycleState:
      type: string
      enum:
        - requested
        - preparing
        - ready
        - locked
        - changes_staged
        - dirty
        - committed
        - failed
        - inaccessible
        - unknown_provider_outcome
        - reconciliation_required
    ReadConsistencyClass:
      type: string
      enum:
        - snapshot_per_task
        - read_your_writes
        - eventually_consistent
    OperatorDispositionLabel:
      type: string
      enum:
        - auto_recovering
        - available
        - degraded_but_serving
        - awaiting_human
        - terminal_until_intervention
    SensitiveMetadataTier:
      type: string
      enum:
        - public_metadata
        - tenant_sensitive
        - credential_sensitive
        - secret
      description: Paths, repository names, branch names, and commit messages default to tenant_sensitive unless stricter tenant policy applies.
    IdempotencyTtlTier:
      type: string
      enum:
        - mutation
        - commit
      description: Mutation tier is 24h. Commit tier inherits the C3 retention period and remains approval-bound.
    FolderMetadata:
      type: object
      additionalProperties: false
      required:
        - displayName
        - metadataClass
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 160
          description: Projected display metadata only; it is not aggregate identity.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        metadataClass:
          $ref: "#/components/schemas/SensitiveMetadataTier"
    CreateFolderRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - folderMetadata
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        parentFolderId:
