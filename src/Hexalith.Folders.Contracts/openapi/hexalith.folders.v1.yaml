    ProjectionFreshnessDiagnostics:
      type: object
      additionalProperties: false
      required:
        - audience
        - projectionName
        - availability
        - freshnessAgeMilliseconds
        - elapsedMilliseconds
        - staleReasonCode
        - unavailableReasonCode
