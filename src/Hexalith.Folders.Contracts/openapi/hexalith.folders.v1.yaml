        unavailableReasonCode:
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z][a-z0-9_]{0,79}$"
        freshnessTarget:
          type: string
          minLength: 1
          maxLength: 160
        fieldClassifications:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: "#/components/schemas/DiagnosticFieldClassificationEntry"
        freshness:
