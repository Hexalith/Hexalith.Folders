      tags:
        - provider-readiness
      operationId: GetProviderBinding
      summary: Inspect a redacted provider binding reference.
      parameters:
        - $ref: "#/components/parameters/ProviderBindingRef"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
      responses:
        "200":
          description: Redacted provider binding metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderBinding"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
