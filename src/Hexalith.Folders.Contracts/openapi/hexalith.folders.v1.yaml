          const: glob
        globPattern:
          type: string
          minLength: 1
          maxLength: 256
          description: Glob pattern is request payload only and must not appear in audit examples or cross-tenant diagnostics.
        requestedPaths:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/PathMetadata"
        limit:
          type: integer
          minimum: 1
          maximum: 500
          maxResultCount: 500
          description: "TODO(reference-pending): docs/exit-criteria/c4-input-limits.md PM approval state is proposed."
        cursor:
          type: string
          maxLength: 256
          description: Opaque, non-secret pagination cursor returned by a prior call's `FileTreeResult.page.cursor`. Echo back to retrieve the next page. The server MUST treat the cursor as non-authoritative for tenant access, ACL, path policy, or sensitivity classification.
    FileRangeReadRequest:
      type: object
      additionalProperties: false
      description: "Single-window byte-range read. Larger files require multiple bounded calls; the window cap is `endOffset - startOffset` not the absolute offset. Derived constraint: `endOffset >= startOffset` and `endOffset - startOffset <= 262144`. Reversed and over-window ranges return canonical Problem Details (400 validation_error for reversed, 422 input_limit_exceeded for over-window)."
      required:
        - requestSchemaVersion
        - path
        - startOffset
        - endOffset
      properties:
        requestSchemaVersion:
          type: string
          const: v1
        path:
          $ref: "#/components/schemas/PathMetadata"
        startOffset:
          type: integer
          minimum: 0
          description: Inclusive zero-based byte offset. May reference any non-negative offset within the authorized file.
        endOffset:
          type: integer
          minimum: 0
          description: "Exclusive byte offset. Derived rule: `endOffset >= startOffset` and `endOffset - startOffset <= 262144` (single read window). Larger files require multiple bounded calls. TODO(reference-pending): docs/exit-criteria/c4-input-limits.md PM approval state is proposed."
    FileRangeReadResult:
      type: object
      additionalProperties: false
      required:
        - path
        - range
        - contentBytes
        - limits
        - freshness
      properties:
        path:
          $ref: "#/components/schemas/PathMetadata"
        range:
          type: object
          additionalProperties: false
          description: "Range descriptor returned with the read result. Derived rule: `partial == (actualBytes < endOffset - startOffset)`. When the server reached end-of-file before the exclusive `endOffset`, `partial` is `true` and `actualBytes` is the bytes returned; the response status is `206 Partial Content`. When `actualBytes == endOffset - startOffset`, `partial` is `false` and the status is `200 OK`."
          required:
            - startOffset
            - endOffset
            - actualBytes
            - partial
          properties:
            startOffset:
              type: integer
              minimum: 0
            endOffset:
              type: integer
              minimum: 0
            actualBytes:
              type: integer
              minimum: 0
              maximum: 262144
            partial:
              type: boolean
              description: "True when `actualBytes < endOffset - startOffset` (end-of-file reached before requested window end)."
        contentBytes:
          type: string
          contentEncoding: base64
          maxLength: 349528
          maxBytes: 262144
          description: Authorized response body for ReadFileRange only; base64-encoded bytes up to 262144 raw bytes (349528 base64 characters). Never audit, log, diagnostic, projection, or generated context material.
        limits:
          $ref: "#/components/schemas/ContextQueryLimitMetadata"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    FileTreeResult:
      type: object
      additionalProperties: false
      required:
        - items
        - page
        - limits
        - freshness
      properties:
        items:
          type: array
          maxItems: 2000
          maxResultCount: 2000
          description: "Metadata-only entries after authorization and path filtering. TODO(reference-pending): docs/exit-criteria/c4-input-limits.md PM approval state is proposed."
          items:
            $ref: "#/components/schemas/FileMetadataItem"
        page:
          $ref: "#/components/schemas/PaginationMetadata"
        limits:
          $ref: "#/components/schemas/ContextQueryLimitMetadata"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    FileMetadataResult:
      type: object
      additionalProperties: false
      required:
        - items
        - limits
        - freshness
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/FileMetadataItem"
        limits:
          $ref: "#/components/schemas/ContextQueryLimitMetadata"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    FileMetadataItem:
      type: object
      additionalProperties: false
      description: |
        File metadata entry returned by tree, metadata, search, and glob context queries.
        Field visibility depends on `redaction`:
          - `not_redacted`  -> `path`, `kind`, `byteLength` (if known), `sensitivity` all present.
          - `redacted`      -> `path` and `byteLength` may be present; no content evidence ever exposed.
          - `excluded`      -> `path` and `byteLength` MUST be omitted; only `kind`, `sensitivity`, `redaction` retained so the caller knows an item was withheld without learning which path.
          - `binary_disallowed` -> `path` may be present; `byteLength` may be omitted; redaction state communicates why the item carries no content evidence.
        Servers MUST omit `path` when `redaction` is `excluded`. The redaction-state-to-field-visibility matrix is contract-binding so safe-denial parity holds across REST, SDK, CLI, and MCP surfaces.
      required:
        - kind
        - sensitivity
        - redaction
      properties:
        path:
          $ref: "#/components/schemas/PathMetadata"
        kind:
          type: string
          enum:
            - file
            - directory
        byteLength:
          type: integer
          minimum: 0
          maximum: 17592186044416
          description: "Per-file byte length cap (16 TiB) keeps schema bounded for downstream SDK code generation. Aggregate response budget is enforced separately via ContextQueryLimitMetadata.actualBytes."
        sensitivity:
          $ref: "#/components/schemas/SensitiveMetadataTier"
        redaction:
          type: string
          enum:
            - not_redacted
            - redacted
            - excluded
            - binary_disallowed
    ContextQueryLimitMetadata:
      type: object
      additionalProperties: false
      description: >
        C4 query metadata. Query duration uses x-hexalith-query-timeout-ms: 2000
        and aggregate response budget uses x-hexalith-response-budget-bytes: 1048576.
        Values remain proposed workshop values until PM approval. When `isTruncated`
        is `true`, `truncatedReason` MUST be present and non-`not_truncated`.
      required:
        - queryFamily
        - configuredLimit
        - actualCount
        - actualBytes
        - elapsedMilliseconds
        - isTruncated
      properties:
        queryFamily:
          type: string
          enum:
            - tree
            - metadata
            - search
            - glob
            - range
            - semantic_reference_pending
        configuredLimit:
          type: integer
          minimum: 0
        actualCount:
          type: integer
          minimum: 0
        actualBytes:
          type: integer
          minimum: 0
          maximum: 1048576
        elapsedMilliseconds:
          type: integer
          minimum: 0
          description: "Soft target is 2000 ms via x-hexalith-query-timeout-ms; legitimate post-processing telemetry above the soft target is allowed up to a generous ceiling for diagnostic purposes."
          maximum: 86400000
        isTruncated:
          type: boolean
        truncatedReason:
          type: string
          enum:
            - result_count_limit
            - response_budget_limit
            - query_timeout
            - not_truncated
      dependentRequired:
        isTruncated:
          - truncatedReason
      allOf:
        - if:
            properties:
              isTruncated:
                const: false
          then:
            properties:
              truncatedReason:
                const: not_truncated
    CommitWorkspaceRequest:
      type: object
