        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: eventstore-envelope-causation-reference
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant_access_then_folder_acl_then_workspace_scope_then_task_lock_scope
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: authorization-before-observation externally-indistinguishable safe-denial
