openapi: 3.1.0
info:
  title: Hexalith.Folders API
  version: v1
  summary: Contract Spine foundation for tenant-scoped repository-backed folder workflows.
  description: >
    Canonical OpenAPI 3.1 foundation for Hexalith.Folders. This document defines
    shared contract language only; operation groups are added by later stories.
    Tenant authority comes from authenticated principal claims and EventStore envelopes,
    never from request payloads, query parameters, or client-controlled headers.
servers:
  - url: /api/v1
    description: URL-versioned REST surface. Deployment hosts and real issuer or audience values are supplied by environment configuration.
tags:
  - name: provider-readiness
    description: Provider readiness evidence and capability diagnostics.
  - name: folders
    description: Tenant-scoped folder lifecycle and repository binding contracts.
  - name: workspaces
    description: Workspace preparation, state, and lock contracts.
  - name: files
    description: File mutation transport contracts.
  - name: commits
    description: Commit and reconciliation contracts.
  - name: query-status
    description: Accepted command and projection status contracts.
  - name: audit
    description: Metadata-only audit review contracts.
  - name: ops-console
    description: Read-only operations console projection contracts.
  - name: context-queries
    description: Bounded metadata-only file and context query contracts.
security:
  - oidcBearer: []
paths:
  /api/v1/folders:
    post:
      tags:
        - folders
      operationId: CreateFolder
      summary: Create a tenant-scoped folder identity.
      description: >
        Creates opaque folder identity and projected metadata. Tenant authority
        comes from authenticated principal claims and EventStore envelopes, never
        from this request.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/CreateFolderRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - folder_metadata.display_name
        - parent_folder_id
        - request_schema_version
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: eventstore-envelope-causation-reference
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-folder-create-permission
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - validation_error
        - idempotency_conflict
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: folder_id
          sensitivity: tenant_sensitive
          description: Opaque folder reference emitted after acceptance.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: correlation_id
          sensitivity: tenant_sensitive
          description: Opaque correlation reference.
        - name: result
          sensitivity: public_metadata
          description: Sanitized accepted or rejected outcome.
      x-hexalith-parity-dimensions:
        transportParity:
          - rest
          - sdk
        behavioralParity:
          - idempotency_key
          - correlation
          - safe_denial
        adapterStages:
          - pre-sdk
          - post-sdk
  /api/v1/folders/{folderId}/lifecycle-status:
    get:
      tags:
        - folders
      operationId: GetFolderLifecycleStatus
      summary: Inspect folder lifecycle and repository binding status.
      parameters:
        - $ref: "#/components/parameters/FolderId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
      responses:
        "200":
          description: Metadata-only folder lifecycle status.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            X-Hexalith-Freshness:
              $ref: "#/components/headers/Freshness"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderLifecycleStatus"
              examples:
                synthetic:
                  $ref: "#/components/examples/FolderLifecycleStatus"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-read-consistency:
        class: eventually_consistent
        freshnessBehavior: returns-projection-watermark-when-available
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: query-correlation-only
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-folder-read-permission
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - folder_acl_denied
        - cross_tenant_access_denied
        - not_found
        - read_model_unavailable
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: folder_id
          sensitivity: tenant_sensitive
          description: Opaque folder reference.
        - name: lifecycle_state
          sensitivity: tenant_sensitive
          description: Sanitized lifecycle state.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: result
          sensitivity: public_metadata
          description: Sanitized result category.
      x-hexalith-parity-dimensions:
        transportParity:
          - rest
          - sdk
        behavioralParity:
          - read_consistency
          - safe_denial
        adapterStages:
          - pre-sdk
          - post-sdk
  /api/v1/folders/{folderId}/archive:
    post:
      tags:
        - folders
      operationId: ArchiveFolder
      summary: Archive a folder without exposing cross-tenant existence.
      parameters:
        - $ref: "#/components/parameters/FolderId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchiveFolderRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - archive_reason_code
        - folder_id
        - request_schema_version
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: eventstore-envelope-causation-reference
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-folder-admin-permission
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - folder_acl_denied
        - validation_error
        - idempotency_conflict
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: folder_id
          sensitivity: tenant_sensitive
          description: Opaque folder reference.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: correlation_id
          sensitivity: tenant_sensitive
          description: Opaque correlation reference.
        - name: result
          sensitivity: public_metadata
          description: Sanitized archive outcome.
      x-hexalith-parity-dimensions:
        transportParity:
          - rest
          - sdk
        behavioralParity:
          - idempotency_key
          - safe_denial
        adapterStages:
          - pre-sdk
          - post-sdk
  /api/v1/folders/{folderId}/acl:
    get:
      tags:
        - folders
      operationId: ListFolderAclEntries
      summary: List metadata-only folder ACL entries.
      parameters:
        - $ref: "#/components/parameters/FolderId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/MetadataFilter"
      responses:
        "200":
          description: Metadata-only ACL entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderAclEntryList"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-read-consistency:
        class: eventually_consistent
        freshnessBehavior: reports-pagination-and-projection-watermark
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: query-correlation-only
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-folder-acl-read-permission
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - folder_acl_denied
        - validation_error
        - read_model_unavailable
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: folder_id
          sensitivity: tenant_sensitive
          description: Opaque folder reference.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: result
          sensitivity: public_metadata
          description: Sanitized query outcome.
      x-hexalith-parity-dimensions:
        transportParity:
          - rest
          - sdk
        behavioralParity:
          - pagination
          - safe_denial
        adapterStages:
          - pre-sdk
          - post-sdk
  /api/v1/folders/{folderId}/acl/{aclEntryId}:
    put:
      tags:
        - folders
      operationId: UpdateFolderAclEntry
      summary: Add, update, or revoke a metadata-only folder ACL entry.
      parameters:
        - $ref: "#/components/parameters/FolderId"
        - $ref: "#/components/parameters/AclEntryId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderAclEntryRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - acl_entry_id
        - folder_id
        - permission_level
        - subject_ref
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: eventstore-envelope-causation-reference
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-folder-acl-admin-permission
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - folder_acl_denied
        - validation_error
        - idempotency_conflict
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: folder_id
          sensitivity: tenant_sensitive
          description: Opaque folder reference.
        - name: acl_entry_id
          sensitivity: tenant_sensitive
          description: Opaque ACL entry reference.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: result
          sensitivity: public_metadata
          description: Sanitized ACL update outcome.
      x-hexalith-parity-dimensions:
        transportParity:
          - rest
          - sdk
        behavioralParity:
          - idempotency_key
          - safe_denial
        adapterStages:
          - pre-sdk
          - post-sdk
  /api/v1/folders/{folderId}/effective-permissions:
    get:
      tags:
        - folders
      operationId: GetEffectivePermissions
      summary: Inspect caller effective permissions without exposing tenant authority fields.
      parameters:
        - $ref: "#/components/parameters/FolderId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
      responses:
        "200":
          description: Metadata-only effective permission result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectivePermissions"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-read-consistency:
        class: read_your_writes
        freshnessBehavior: reports-authorization-projection-watermark
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: query-correlation-only
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-folder-permission-read
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - folder_acl_denied
        - read_model_unavailable
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: folder_id
          sensitivity: tenant_sensitive
          description: Opaque folder reference.
        - name: authorization_outcome
          sensitivity: tenant_sensitive
          description: Sanitized authorization outcome class.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: result
          sensitivity: public_metadata
          description: Sanitized query outcome.
      x-hexalith-parity-dimensions:
        transportParity:
          - rest
          - sdk
        behavioralParity:
          - authorization_outcome
          - safe_denial
        adapterStages:
          - pre-sdk
          - post-sdk
  /api/v1/provider-bindings/{providerBindingRef}:
    put:
      tags:
        - provider-readiness
      operationId: ConfigureProviderBinding
      summary: Configure a provider binding reference without credential material.
      parameters:
        - $ref: "#/components/parameters/ProviderBindingRef"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureProviderBindingRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - capability_profile_ref
        - non_secret_credential_reference
        - provider_binding_ref
        - provider_family_ref
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: eventstore-envelope-causation-reference
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-provider-binding-admin
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - credential_reference_invalid
        - provider_unavailable
        - validation_error
        - idempotency_conflict
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: provider_binding_ref
          sensitivity: tenant_sensitive
          description: Opaque provider binding reference.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: correlation_id
          sensitivity: tenant_sensitive
          description: Opaque correlation reference.
        - name: result
          sensitivity: public_metadata
          description: Sanitized provider binding outcome.
      x-hexalith-parity-dimensions:
        transportParity:
          - rest
          - sdk
        behavioralParity:
          - credential_reference_redaction
          - provider_capability
        adapterStages:
          - pre-sdk
          - post-sdk
    get:
      tags:
        - provider-readiness
      operationId: GetProviderBinding
      summary: Inspect a redacted provider binding reference.
      parameters:
        - $ref: "#/components/parameters/ProviderBindingRef"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
      responses:
        "200":
          description: Redacted provider binding metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderBinding"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-read-consistency:
        class: eventually_consistent
        freshnessBehavior: redacted-binding-projection-watermark
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: query-correlation-only
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-provider-binding-read
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - cross_tenant_access_denied
        - not_found
        - read_model_unavailable
        - redacted
        - internal_error
      x-hexalith-audit-metadata-keys:
        - name: provider_binding_ref
          sensitivity: tenant_sensitive
          description: Opaque provider binding reference.
        - name: operation_id
          sensitivity: tenant_sensitive
          description: Stable operation identifier.
        - name: result
          sensitivity: public_metadata
