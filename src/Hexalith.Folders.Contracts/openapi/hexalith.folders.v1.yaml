  /api/v1/folders/{folderId}/workspaces/{workspaceId}/commits:
    post:
      tags:
        - commits
      operationId: CommitWorkspace
      summary: Accept a metadata-only workspace commit request.
      description: >
        Accepts a replay-sensitive commit command for a prepared workspace with
        staged changes and a task-scoped lock. Provider and Git side effects are
        deferred to Epic 4 workers; this contract only records accepted command
        state, metadata-only changed-path evidence, retry eligibility, and
        reconciliation boundaries. Tenant authority comes from authenticated
        principal claims and EventStore envelopes, never from request payloads,
        route identifiers, query parameters, or client-controlled headers.
        TODO(reference-pending): docs/exit-criteria/c3-retention.md Legal and PM approval for commit tier.
      parameters:
        - $ref: "#/components/parameters/FolderId"
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - name: X-Hexalith-Task-Id
          in: header
          required: true
          description: Caller-provided task identity. Required because task_id participates in commit idempotency equivalence.
          schema:
            $ref: "#/components/schemas/OpaqueIdentifier"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitWorkspaceRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/CommitWorkspaceRequest"
      responses:
        "202":
          description: Commit command accepted. Accepted command state is not durable provider completion.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            X-Hexalith-Task-Id:
              $ref: "#/components/headers/TaskId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitWorkspaceAccepted"
              examples:
                synthetic:
                  $ref: "#/components/examples/CommitWorkspaceAccepted"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "409":
          description: Commit conflict after authorization succeeds; includes idempotency conflict, dirty workspace, unknown provider outcome, and reconciliation-required cases without blind retry guidance.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                idempotencyConflict:
                  $ref: "#/components/examples/IdempotencyConflictGeneric"
                dirtyWorkspace:
                  $ref: "#/components/examples/DirtyWorkspaceProblem"
                unknownProviderOutcome:
                  $ref: "#/components/examples/UnknownProviderOutcomeConflictProblem"
                reconciliationRequired:
                  $ref: "#/components/examples/ReconciliationRequiredProblem"
        "422":
          description: Commit cannot proceed because workspace, lock, staged-change, branch/ref, or C6 state prerequisites are invalid after authorization succeeds.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                commitFailed:
                  $ref: "#/components/examples/CommitFailedProblem"
                workspaceTransitionInvalid:
                  $ref: "#/components/examples/WorkspaceTransitionInvalidProblem"
        "503":
          description: Provider or read-model dependency cannot produce a safe commit outcome.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              examples:
                providerUnavailable:
                  $ref: "#/components/examples/ProviderUnavailableProblem"
                providerKnownFailure:
                  $ref: "#/components/examples/ProviderKnownFailureProblem"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
