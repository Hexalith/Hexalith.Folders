                - failed
                - completed
                - unavailable
              description: "TODO(reference-pending C5/C6) approved acceptedCommandState vocabulary owner. This inline enum is a candidate set pending shared C6-aligned accepted-command-state vocabulary; do not treat these four values as a frozen contract."
