            - $ref: "#/components/schemas/PrefixedOpaqueIdentifier"
          pattern: "^digest_[A-Za-z0-9_-]{8,120}$"
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        reference:
          allOf:
            - $ref: "#/components/schemas/PrefixedOpaqueIdentifier"
          pattern: "^changeref_[A-Za-z0-9_-]{8,120}$"
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        classification:
          $ref: "#/components/schemas/DiagnosticFieldClassification"
      oneOf:
        - title: digest-evidence
          required: [digest]
          properties:
            evidenceKind:
              const: digest
          not:
            anyOf:
              - required: [reference]
        - title: reference-evidence
          required: [reference]
          properties:
            evidenceKind:
              const: reference
          not:
            anyOf:
              - required: [digest]
        - title: redacted-evidence
          properties:
            evidenceKind:
              const: redacted
          not:
            anyOf:
              - required: [digest]
              - required: [reference]
        - title: unavailable-evidence
          properties:
            evidenceKind:
              const: unavailable
          not:
            anyOf:
              - required: [digest]
              - required: [reference]
    DiagnosticTrustEvidence:
      type: object
      additionalProperties: false
      required:
        - availability
        - freshnessAgeMilliseconds
        - staleReasonCode
        - unavailableReasonCode
      properties:
        availability:
          $ref: "#/components/schemas/ProjectionAvailability"
        freshnessAgeMilliseconds:
          type: integer
          minimum: 0
          maximum: 86400000
          description: "TODO(reference-pending): C5 projection freshness target."
        staleReasonCode:
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z][a-z0-9_]{0,79}$"
        unavailableReasonCode:
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z][a-z0-9_]{0,79}$"
    DiagnosticBase:
      type: object
      required:
        - audience
        - status
        - disposition
        - trust
        - fieldClassifications
        - freshness
      properties:
        audience:
          $ref: "#/components/schemas/DiagnosticAudience"
        status:
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z][a-z0-9_]{0,79}$"
        disposition:
          $ref: "#/components/schemas/OperatorDispositionLabel"
        trust:
          $ref: "#/components/schemas/DiagnosticTrustEvidence"
        fieldClassifications:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: "#/components/schemas/DiagnosticFieldClassificationEntry"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
      allOf:
        - if:
            properties:
              trust:
                properties:
                  availability:
                    const: available
          then:
            properties:
              freshness:
                properties:
                  stale:
                    const: false
        - if:
            properties:
              trust:
                properties:
                  availability:
                    enum:
                      - stale
                      - unavailable
                      - redacted
                      - unknown
          then:
            properties:
              freshness:
                properties:
                  stale:
                    const: true
    ReadinessDiagnostics:
      allOf:
        - $ref: "#/components/schemas/DiagnosticBase"
        - type: object
          required:
            - providerSummaryReference
            - folderSummaryReference
            - workspaceSummaryReference
          properties:
            providerSummaryReference:
              $ref: "#/components/schemas/RedactableDiagnosticIdentifier"
            folderSummaryReference:
              $ref: "#/components/schemas/RedactableDiagnosticIdentifier"
            workspaceSummaryReference:
              $ref: "#/components/schemas/RedactableDiagnosticIdentifier"
      unevaluatedProperties: false
    LockDiagnostics:
