# DAPR Secret Store -- Memories Server (Local Development)
# ================================================================
# Local file secret store backing the Memories server's secret lookups (e.g. embedding-provider API
# keys). Dev-only: production swaps this for a cloud secret manager. The named component is "secretstore"
# (the name the Memories server resolves); the AppHost registers it under the unique resource id
# "memories-secretstore" so it does not collide with other components.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore
spec:
  type: secretstores.local.file
  version: v1
  metadata:
    # Resolved relative to the Dapr sidecar working directory in local dev. Adjust to an absolute path
    # if the sidecar is launched from a different directory.
    - name: secretsFile
      value: "DaprComponents/secrets.json"
    - name: nestedSeparator
      value: ":"
