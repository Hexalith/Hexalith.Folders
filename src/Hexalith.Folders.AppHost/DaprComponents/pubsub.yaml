# DAPR Pub/Sub Component -- Local Development
# ================================================================
# Redis-backed pub/sub for tenant event distribution.
# Dead-lettering is an application-level concern: EventStore's dead-letter
# publisher routes failed command-processing deliveries to the
# deadletter.tenants.events topic. It is NOT configured here -- DAPR's native
# dead-letter topic is a per-subscription setting, not pub/sub component
# metadata (the Redis component silently ignores enableDeadLetter/deadLetterTopic).
#
# Component Scoping (Folders topology, Epic 9): the EventStore command gateway publishes tenant
# events; the Tenants service and the Folders services subscribe; the Memories search-index server
# (Story 9.2) reuses this shared pub/sub. Local development intentionally omits topic-level
# publishingScopes and subscriptionScopes so local experiments are not blocked by production-only
# topic policy.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    # DAPR local init provisions Redis at localhost:6379 with no password.
    - name: redisHost
      value: "localhost:6379"
    - name: redisPassword
      value: ""
scopes:
  - eventstore
  - tenants
  - folders
  - folders-workers
  - folders-ui
  - memories
