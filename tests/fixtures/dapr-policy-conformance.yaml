version: 1
policyProvenance:
  path: deploy/dapr/production/accesscontrol.yaml
  hashAlgorithm: sha256-normalized-policy-v1
  semanticSha256: "a3f2e9fe6bfe848f8c280e7d886e651ea2e9080604de1cd8057afe54be76607e"
  normalization: "Parsed Dapr Configuration accessControl semantics; comments and YAML line endings are ignored."
mtlsEvidence:
  path: deploy/dapr/production/daprsystem.yaml
  expectedEnabled: true
targetPolicies:
  - targetAppId: folders
    allowRules:
      - id: folders.eventstore.process.post
        sourceAppId: eventstore
        operation: /process
        httpVerb: POST
        namespace: hexalith-production
        trustDomain: hexalith-production
      - id: folders.eventstore.project.post
        sourceAppId: eventstore
        operation: /project
        httpVerb: POST
        namespace: hexalith-production
        trustDomain: hexalith-production
  - targetAppId: eventstore
    allowRules: []
  - targetAppId: tenants
    allowRules: []
  - targetAppId: folders-workers
    allowRules: []
  - targetAppId: folders-ui
    allowRules: []
  - targetAppId: memories
    allowRules:
      - id: memories.folders.api-search.get
        sourceAppId: folders
        operation: /api/search
        httpVerb: GET
        namespace: hexalith-production
        trustDomain: hexalith-production
# Negative-control note: with the current minimal allow-list (only eventstore -> folders), both
# "unknown-source-app" (e.g. external-worker) and "known-unauthorized-source-app" (e.g. folders-ui)
# are denied via the global deny-by-default path because no scoped caller policy exists for them yet.
# When a known app gains a scoped caller policy with a denied operation, its negative control should be
# repointed at that policy so it exercises the per-policy operation-deny path distinctly.
cases:
  - id: allow-folders-eventstore-process-post
    ruleId: folders.eventstore.process.post
    targetAppId: folders
    sourceAppId: eventstore
    operation: /process
    httpVerb: POST
    namespace: hexalith-production
    trustDomain: hexalith-production
    expectedOutcome: allow
  - id: deny-process-unknown-source
    ruleId: folders.eventstore.process.post
    targetAppId: folders
    sourceAppId: external-worker
    operation: /process
    httpVerb: POST
    namespace: hexalith-production
    trustDomain: hexalith-production
    negativeCategory: unknown-source-app
    expectedOutcome: "403"
  - id: deny-process-known-unauthorized-source
    ruleId: folders.eventstore.process.post
    targetAppId: folders
    sourceAppId: folders-ui
    operation: /process
    httpVerb: POST
    namespace: hexalith-production
    trustDomain: hexalith-production
    negativeCategory: known-unauthorized-source-app
    expectedOutcome: "403"
  - id: deny-process-wrong-target
    ruleId: folders.eventstore.process.post
    targetAppId: tenants
    sourceAppId: eventstore
    operation: /process
    httpVerb: POST
    namespace: hexalith-production
    trustDomain: hexalith-production
    negativeCategory: wrong-target-app
    expectedOutcome: "403"
  - id: deny-process-wrong-operation
    ruleId: folders.eventstore.process.post
    targetAppId: folders
    sourceAppId: eventstore
    operation: /status
    httpVerb: POST
    namespace: hexalith-production
    trustDomain: hexalith-production
    negativeCategory: wrong-operation
    expectedOutcome: "403"
  - id: deny-process-wrong-http-verb
    ruleId: folders.eventstore.process.post
    targetAppId: folders
    sourceAppId: eventstore
    operation: /process
    httpVerb: GET
    namespace: hexalith-production
    trustDomain: hexalith-production
    negativeCategory: wrong-http-verb
    expectedOutcome: "403"
  - id: deny-process-wrong-namespace
    ruleId: folders.eventstore.process.post
    targetAppId: folders
    sourceAppId: eventstore
    operation: /process
    httpVerb: POST
    namespace: default
    trustDomain: hexalith-production
    negativeCategory: wrong-namespace
    expectedOutcome: "403"
  - id: deny-process-wrong-trust-domain
    ruleId: folders.eventstore.process.post
